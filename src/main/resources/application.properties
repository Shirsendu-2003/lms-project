server.port=${PORT:8080}
spring.application.name=lms-backend

# ===============================
# Database (Non-Sensitive Values)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/lmsdb
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# ===============================
# Load Sensitive Properties
# ===============================
spring.profiles.active=secret



spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# where uploaded medical certificates go (relative to app working dir)
file.upload-dir=uploads/medical

